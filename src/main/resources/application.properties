# Bật cơ chế bảo mật của Spring
spring.security.enabled=true

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=hoadon_database;encrypt=false
spring.datasource.username=sa
spring.datasource.password=Abc12345!
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.globally_quoted_identifiers=true

jwt.secret=7e7f9c4f3b6d8a2c1f4e6d8b9c0a1e2f7e7f9c4f3b6d8a2c1f4e6d8b9c0a1e2
jwt.expiration_ms=86400000

# Ghi log ra file và đặt package hệ thống ở mức DEBUG để lưu log AuthController
logging.file.name=logs/hoadon.log
logging.level.vn.hoadon=DEBUG

# Cấu hình mail dự phòng. SMTP chính được lưu trong bảng mail_servers.
# Để trống username/password tại đây; cấu hình SMTP trong giao diện ứng dụng.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Khóa AES-256 để mã hóa mật khẩu SMTP lưu trong DB. Nên thay bằng chuỗi bí mật dài từ 32 ký tự.
app.encryption.key=HdAES256_9xKpLq7VmZ2rT8sW4nY!

# Hàng đợi mail bằng database
# Tác vụ gửi email được lưu trong bảng mail_jobs của SQL Server và xử lý bởi DbMailQueueWorker.
mail.queue.max-retries=3
