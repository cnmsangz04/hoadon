spring.application.name=hoadon

# UTF8
spring.mandatory-file-encoding=UTF-8
spring.mail.default-encoding=UTF-8

# Port (use 8081 to avoid colliding with frontend dev server on 8080)
server.port=8081

# Frontend URL used in email links.
app.frontend-url=http://localhost:8080

# Enable Spring Security
spring.security.enabled=true

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=hoadon_database;encrypt=false
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.globally_quoted_identifiers=true

jwt.secret=7e7f9c4f3b6d8a2c1f4e6d8b9c0a1e2f7e7f9c4f3b6d8a2c1f4e6d8b9c0a1e2
jwt.expiration_ms=86400000

# Log to file and set our package to DEBUG so AuthController logs are persisted
logging.file.name=logs/hoadon.log
logging.level.vn.hoadon=DEBUG

# Spring Mail fallback. Main SMTP settings are stored in the mail_servers table.
# Leave username/password empty here; configure SMTP in the app UI.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# AES-256 key for SMTP passwords stored in DB. Replace with a 32+ char secret.
app.encryption.key=HdAES256_9xKpLq7VmZ2rT8sW4nY!

# Database mail queue
# Email jobs are stored in SQL Server table mail_jobs and processed by DbMailQueueWorker.
mail.queue.max-retries=3
